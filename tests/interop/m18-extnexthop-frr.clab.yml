# Containerlab topology: rustbgpd ↔ FRR (M18 — Extended Next-Hop, RFC 8950)
#
# Validates: IPv4 unicast routes exchanged with IPv6 next-hop via MP_REACH_NLRI.
#
# Dual-stack link: IPv4 (10.0.0.0/24) + IPv6 (fd00::/64)
# FRR (AS 65002) advertises: IPv4 routes with IPv6 next-hop via route-map
# rustbgpd (AS 65001) receives IPv4 routes with IPv6 NH, and sends IPv4 routes
# with IPv6 NH when extended-nexthop is negotiated.
#
# Usage:
#   containerlab deploy -t tests/interop/m18-extnexthop-frr.clab.yml
#   containerlab destroy -t tests/interop/m18-extnexthop-frr.clab.yml

name: m18-extnexthop-frr

topology:
  nodes:
    rustbgpd:
      kind: linux
      image: rustbgpd:dev
      cmd: sleep infinity
      binds:
        - ./configs/rustbgpd-m18-extnexthop.toml:/etc/rustbgpd/config.toml:ro
        - ./scripts/start-rustbgpd.sh:/usr/local/bin/start-rustbgpd.sh:ro
      exec:
        - ip addr add 10.0.0.1/24 dev eth1
        - ip -6 addr add fd00::1/64 dev eth1
        - ip link set eth1 up
      env:
        RUST_LOG: info

    frr:
      kind: linux
      image: quay.io/frrouting/frr:10.3.1
      binds:
        - ./configs/frr-daemons:/etc/frr/daemons:ro
        - ./configs/frr-bgpd-m18-extnexthop.conf:/etc/frr/frr.conf:ro
      exec:
        - ip addr add 10.0.0.2/24 dev eth1
        - ip -6 addr add fd00::2/64 dev eth1
        - ip link set eth1 up

  links:
    - endpoints: ["rustbgpd:eth1", "frr:eth1"]

# Network: 10.0.0.0/24 + fd00::/64 — rustbgpd (10.0.0.1/fd00::1) ↔ FRR (10.0.0.2/fd00::2)
