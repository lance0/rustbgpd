# Containerlab topology: rustbgpd ↔ FRR (MP-BGP / IPv6 Unicast)
#
# Validates: MP-BGP capability negotiation, IPv6 NLRI via MP_REACH_NLRI,
# dual-stack (IPv4 + IPv6) route exchange, IPv6 withdrawal, and
# IPv4 backward compatibility.
#
# FRR advertises:
#   IPv4: 192.168.1.0/24, 10.10.0.0/16
#   IPv6: 2001:db8:1::/48, 2001:db8:2::/48
#
# Usage:
#   containerlab deploy -t tests/interop/m10-frr-ipv6.clab.yml
#   containerlab destroy -t tests/interop/m10-frr-ipv6.clab.yml

name: m10-frr-ipv6

topology:
  nodes:
    rustbgpd:
      kind: linux
      image: rustbgpd:dev
      binds:
        - ./configs/rustbgpd-m10-frr-ipv6.toml:/etc/rustbgpd/config.toml:ro
        - ./scripts/start-rustbgpd.sh:/usr/local/bin/start-rustbgpd.sh:ro
      exec:
        - ip addr add 10.0.0.1/24 dev eth1
        - ip -6 addr add fd00::1/64 dev eth1
        - ip link set eth1 up
      env:
        RUST_LOG: info

    frr:
      kind: linux
      image: quay.io/frrouting/frr:10.3.1
      binds:
        - ./configs/frr-daemons:/etc/frr/daemons:ro
        - ./configs/frr-bgpd-m10-ipv6.conf:/etc/frr/frr.conf:ro
      exec:
        - ip addr add 10.0.0.2/24 dev eth1
        - ip -6 addr add fd00::2/64 dev eth1
        - ip link set eth1 up

  links:
    - endpoints: ["rustbgpd:eth1", "frr:eth1"]

# Network: 10.0.0.0/24 + fd00::/64
# rustbgpd: 10.0.0.1 / fd00::1, AS 65001
# FRR:      10.0.0.2 / fd00::2, AS 65002
