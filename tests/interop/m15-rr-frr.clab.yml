# Containerlab topology: rustbgpd ↔ FRR (M15 — Route Refresh)
#
# Validates: SoftResetIn via gRPC triggers route re-advertisement from
# FRR and re-applies import policy.
#
# Usage:
#   containerlab deploy -t tests/interop/m15-rr-frr.clab.yml
#   containerlab destroy -t tests/interop/m15-rr-frr.clab.yml

name: m15-rr-frr

topology:
  nodes:
    rustbgpd:
      kind: linux
      image: rustbgpd:dev
      cmd: sleep infinity
      binds:
        - ./configs/rustbgpd-m15-rr.toml:/etc/rustbgpd/config.toml:ro
        - ./scripts/start-rustbgpd.sh:/usr/local/bin/start-rustbgpd.sh:ro
      exec:
        - ip addr add 10.0.0.1/24 dev eth1
        - ip link set eth1 up
      env:
        RUST_LOG: info

    frr:
      kind: linux
      image: quay.io/frrouting/frr:10.3.1
      binds:
        - ./configs/frr-daemons:/etc/frr/daemons:ro
        - ./configs/frr-bgpd-m15-rr.conf:/etc/frr/frr.conf:ro
      exec:
        - ip addr add 10.0.0.2/24 dev eth1
        - ip link set eth1 up

  links:
    - endpoints: ["rustbgpd:eth1", "frr:eth1"]

# rustbgpd: 10.0.0.1, AS 65001
# FRR:      10.0.0.2, AS 65002
