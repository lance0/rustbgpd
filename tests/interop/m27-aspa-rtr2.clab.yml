# Containerlab topology: rustbgpd ↔ FRR-A + FRR-B + RTR v2 server
#
# Validates: RTR v2 negotiation, ASPA record delivery, ASPA validation
# states (valid/invalid/unknown), best-path ASPA preference (step 0.7),
# ROA + ASPA coexistence over single RTR v2 session.
#
# Two FRR peers advertise routes with different AS_PATHs to exercise
# all three ASPA states.  Both advertise 172.16.0.0/24 — one with
# ASPA-valid path, the other ASPA-invalid — to prove best-path prefers
# Valid over Invalid at step 0.7.
#
# Usage:
#   containerlab deploy -t tests/interop/m27-aspa-rtr2.clab.yml
#   containerlab destroy -t tests/interop/m27-aspa-rtr2.clab.yml

name: m27-aspa-rtr2

mgmt:
  network: clab-mgmt

topology:
  nodes:
    rustbgpd:
      kind: linux
      image: rustbgpd:dev
      cmd: sleep infinity
      binds:
        - ./configs/rustbgpd-m27-aspa.toml:/etc/rustbgpd/config.toml:ro
        - ./scripts/start-rustbgpd.sh:/usr/local/bin/start-rustbgpd.sh:ro
      exec:
        - ip addr add 10.0.0.1/24 dev eth1
        - ip link set eth1 up
        - ip addr add 10.0.1.1/24 dev eth2
        - ip link set eth2 up
      env:
        RUST_LOG: info

    frr-a:
      kind: linux
      image: quay.io/frrouting/frr:10.3.1
      binds:
        - ./configs/frr-daemons:/etc/frr/daemons:ro
        - ./configs/frr-bgpd-m27-a.conf:/etc/frr/frr.conf:ro
      exec:
        - ip addr add 10.0.0.2/24 dev eth1
        - ip link set eth1 up

    frr-b:
      kind: linux
      image: quay.io/frrouting/frr:10.3.1
      binds:
        - ./configs/frr-daemons:/etc/frr/daemons:ro
        - ./configs/frr-bgpd-m27-b.conf:/etc/frr/frr.conf:ro
      exec:
        - ip addr add 10.0.1.2/24 dev eth1
        - ip link set eth1 up

    rtr-server:
      kind: linux
      image: python:3.12-slim
      cmd: sleep infinity
      binds:
        - ./scripts/rtr-v2-server.py:/usr/local/bin/rtr-v2-server.py:ro

  links:
    - endpoints: ["rustbgpd:eth1", "frr-a:eth1"]
    - endpoints: ["rustbgpd:eth2", "frr-b:eth1"]

# Network A: 10.0.0.0/24 (rustbgpd ↔ FRR-A)
#   rustbgpd: 10.0.0.1, AS 65001
#   FRR-A:    10.0.0.2, AS 65002
#
# Network B: 10.0.1.0/24 (rustbgpd ↔ FRR-B)
#   rustbgpd: 10.0.1.1, AS 65001
#   FRR-B:    10.0.1.2, AS 65006
#
# RTR server: management network only (TCP 3323)
