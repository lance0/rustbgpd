# Containerlab topology: rustbgpd ↔ FRR (M11 — Graceful Restart)
#
# Validates: GR capability negotiation, stale route preservation on peer
# restart, End-of-RIB clearing stale flag, timer expiry sweeping stale routes.
#
# FRR advertises: 192.168.1.0/24, 192.168.2.0/24, 10.10.0.0/16
# FRR has bgp graceful-restart enabled with restart-time 30.
# rustbgpd has gr_restart_time=30, gr_stale_routes_time=30.
#
# Usage:
#   containerlab deploy -t tests/interop/m11-gr-frr.clab.yml
#   containerlab destroy -t tests/interop/m11-gr-frr.clab.yml

name: m11-gr-frr

topology:
  nodes:
    rustbgpd:
      kind: linux
      image: rustbgpd:dev
      binds:
        - ./configs/rustbgpd-m11-gr.toml:/etc/rustbgpd/config.toml:ro
        - ./scripts/start-rustbgpd.sh:/usr/local/bin/start-rustbgpd.sh:ro
      exec:
        - ip addr add 10.0.0.1/24 dev eth1
        - ip link set eth1 up
      env:
        RUST_LOG: info

    frr:
      kind: linux
      image: quay.io/frrouting/frr:10.3.1
      binds:
        - ./configs/frr-daemons:/etc/frr/daemons:ro
        - ./configs/frr-bgpd-m11-gr.conf:/etc/frr/frr.conf:ro
      exec:
        - ip addr add 10.0.0.2/24 dev eth1
        - ip link set eth1 up

  links:
    - endpoints: ["rustbgpd:eth1", "frr:eth1"]

# Network: 10.0.0.0/24
# rustbgpd: 10.0.0.1, AS 65001
# FRR:      10.0.0.2, AS 65002
