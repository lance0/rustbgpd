frr version 10.3.1
frr defaults traditional
hostname frr-m12
log stdout informational

route-map EC_OUT permit 10
 set extcommunity rt 65002:100
!
router bgp 65002
 bgp router-id 10.0.0.2
 no bgp ebgp-requires-policy
 neighbor 10.0.0.1 remote-as 65001
 neighbor 10.0.0.1 description rustbgpd-m12
 neighbor 10.0.0.1 timers 30 90
 !
 address-family ipv4 unicast
  network 192.168.1.0/24
  network 192.168.2.0/24
  neighbor 10.0.0.1 route-map EC_OUT out
 exit-address-family
!
ip route 192.168.1.0/24 10.0.0.2
ip route 192.168.2.0/24 10.0.0.2
!
