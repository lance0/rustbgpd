frr version 10.3.1
frr defaults traditional
hostname frr-m20-replace
log stdout informational

router bgp 65004
 bgp router-id 10.0.3.2
 no bgp ebgp-requires-policy
 neighbor 10.0.3.1 remote-as 65001
 neighbor 10.0.3.1 description rustbgpd-m20
 neighbor 10.0.3.1 timers 30 90
 !
 address-family ipv4 unicast
 exit-address-family
!
