[global]
asn = 65001
router_id = "10.0.0.1"
listen_port = 179

[global.telemetry]
prometheus_addr = "0.0.0.0:9179"
log_format = "json"

[global.telemetry.grpc_tcp]
address = "0.0.0.0:50051"

# Import policy: set LOCAL_PREF 150 on all routes
[[policy.import]]
prefix = "0.0.0.0/0"
le = 32
action = "permit"
set_local_pref = 150

[[neighbors]]
address = "10.0.0.2"
remote_asn = 65002
description = "frr-m15"
hold_time = 90
