frr version 10.3.1
frr defaults traditional
hostname frr-m11-gr
log stdout informational

router bgp 65002
 bgp router-id 10.0.0.2
 no bgp ebgp-requires-policy
 bgp graceful-restart
 bgp graceful-restart restart-time 30
 neighbor 10.0.0.1 remote-as 65001
 neighbor 10.0.0.1 description rustbgpd-m11-gr
 neighbor 10.0.0.1 timers 10 30
 !
 address-family ipv4 unicast
  network 192.168.1.0/24
  network 192.168.2.0/24
  network 10.10.0.0/16
 exit-address-family
!
ip route 192.168.1.0/24 10.0.0.2
ip route 192.168.2.0/24 10.0.0.2
ip route 10.10.0.0/16 10.0.0.2
!
