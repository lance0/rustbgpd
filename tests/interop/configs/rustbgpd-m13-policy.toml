[global]
asn = 65001
router_id = "10.0.0.1"
listen_port = 179

[global.telemetry]
prometheus_addr = "0.0.0.0:9179"
log_format = "json"

[global.telemetry.grpc_tcp]
address = "0.0.0.0:50051"

# --- Named policy definitions ---

# Deny prefixes longer than /24
[policy.definitions.deny-long-prefixes]
default_action = "permit"
[[policy.definitions.deny-long-prefixes.statements]]
prefix = "0.0.0.0/0"
ge = 25
le = 32
action = "deny"

# Tag 10.0.0.0/8 le 16 with community 65001:100
[policy.definitions.tag-internal]
[[policy.definitions.tag-internal.statements]]
prefix = "10.0.0.0/8"
le = 16
action = "permit"
set_community_add = ["65001:100"]

# Set LOCAL_PREF 200 for routes from AS 65002
[policy.definitions.set-lp-upstream]
[[policy.definitions.set-lp-upstream.statements]]
match_as_path = "_65002_"
action = "permit"
set_local_pref = 200

# --- Import chain: all three fire in sequence (chain accumulates) ---
[policy]
import_chain = ["deny-long-prefixes", "tag-internal", "set-lp-upstream"]

# --- Export policy (inline, first-match is fine here) ---

[[policy.export]]
prefix = "10.10.0.0/16"
action = "deny"

[[policy.export]]
prefix = "0.0.0.0/0"
le = 24
action = "permit"
set_med = 50
set_as_path_prepend = { asn = 65001, count = 2 }

# --- Neighbors ---

[[neighbors]]
address = "10.0.0.2"
remote_asn = 65002
description = "frr-a-upstream"
hold_time = 90

[[neighbors]]
address = "10.0.1.2"
remote_asn = 65003
description = "frr-b-downstream"
hold_time = 90
