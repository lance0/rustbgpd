frr version 10.3.1
frr defaults traditional
hostname frr-m27-a
log stdout informational

! Route-maps to prepend different origin ASNs, creating diverse ASPA states.
! FRR-A is AS 65002.  rustbgpd sees AS_PATH = [65002, <prepended>].
!
! ASPA records at the RTR server:
!   65003 → providers [65002, 65006]  (paths via 65003 are Valid)
!   65004 → providers [65099]         (paths via 65004 are Invalid — 65002 not listed)
!   65005 → no record                 (paths via 65005 are Unknown)

ip prefix-list PFX-VALID-MULTI seq 10 permit 192.168.2.0/24

ip prefix-list PFX-INVALID seq 10 permit 192.168.3.0/24
ip prefix-list PFX-INVALID seq 20 permit 172.16.0.0/24

ip prefix-list PFX-UNKNOWN seq 10 permit 192.168.4.0/24

route-map ASPA-OUT permit 10
 match ip address prefix-list PFX-VALID-MULTI
 set as-path prepend 65003
!
route-map ASPA-OUT permit 20
 match ip address prefix-list PFX-INVALID
 set as-path prepend 65004
!
route-map ASPA-OUT permit 30
 match ip address prefix-list PFX-UNKNOWN
 set as-path prepend 65005
!
route-map ASPA-OUT permit 100
 ! 192.168.1.0/24 — no prepend (single-hop, ASPA valid)
!

router bgp 65002
 bgp router-id 10.0.0.2
 no bgp ebgp-requires-policy
 neighbor 10.0.0.1 remote-as 65001
 neighbor 10.0.0.1 description rustbgpd-m27
 neighbor 10.0.0.1 timers 30 90
 !
 address-family ipv4 unicast
  network 192.168.1.0/24
  network 192.168.2.0/24
  network 192.168.3.0/24
  network 192.168.4.0/24
  network 172.16.0.0/24
  neighbor 10.0.0.1 route-map ASPA-OUT out
 exit-address-family
!
ip route 192.168.1.0/24 10.0.0.2
ip route 192.168.2.0/24 10.0.0.2
ip route 192.168.3.0/24 10.0.0.2
ip route 192.168.4.0/24 10.0.0.2
ip route 172.16.0.0/24 10.0.0.2
!
