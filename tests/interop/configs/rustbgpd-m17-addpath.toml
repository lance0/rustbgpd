[global]
asn = 65001
router_id = "10.0.0.1"
listen_port = 179

[global.telemetry]
prometheus_addr = "0.0.0.0:9179"
log_format = "json"

[global.telemetry.grpc_tcp]
address = "0.0.0.0:50051"

# FRR-A: source peer, no add-path
[[neighbors]]
address = "10.0.0.2"
remote_asn = 65002
description = "frr-a"
hold_time = 90

# FRR-B: source peer, no add-path
[[neighbors]]
address = "10.0.1.2"
remote_asn = 65003
description = "frr-b"
hold_time = 90

# FRR-Client: add-path send enabled (receives multiple paths per prefix)
[[neighbors]]
address = "10.0.2.2"
remote_asn = 65004
description = "frr-client"
hold_time = 90

[neighbors.add_path]
receive = true
send = true
send_max = 4
