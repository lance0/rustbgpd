frr version 10.3.1
frr defaults traditional
hostname frr-m27-b
log stdout informational

! FRR-B is AS 65006.  Advertises 172.16.0.0/24 with prepend 65003.
! rustbgpd sees AS_PATH = [65006, 65003].
! ASPA check: 65003 authorizes 65006 as provider → Valid.
! This competes with FRR-A's ASPA-Invalid route for the same prefix.

route-map ASPA-OUT permit 10
 set as-path prepend 65003
!

router bgp 65006
 bgp router-id 10.0.1.2
 no bgp ebgp-requires-policy
 neighbor 10.0.1.1 remote-as 65001
 neighbor 10.0.1.1 description rustbgpd-m27
 neighbor 10.0.1.1 timers 30 90
 !
 address-family ipv4 unicast
  network 172.16.0.0/24
  neighbor 10.0.1.1 route-map ASPA-OUT out
 exit-address-family
!
ip route 172.16.0.0/24 10.0.1.2
!
