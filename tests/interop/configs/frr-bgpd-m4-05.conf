frr version 10.3.1
frr defaults traditional
hostname frr-m4-05
log stdout informational

router bgp 65014
 bgp router-id 10.0.14.2
 no bgp ebgp-requires-policy
 neighbor 10.0.14.1 remote-as 65001
 neighbor 10.0.14.1 description rustbgpd-m4
 neighbor 10.0.14.1 timers 30 90
 !
 address-family ipv4 unicast
  network 172.16.50.0/24
  network 172.16.51.0/24
 exit-address-family
!
ip route 172.16.50.0/24 10.0.14.2
ip route 172.16.51.0/24 10.0.14.2
!
