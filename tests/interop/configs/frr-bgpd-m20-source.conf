frr version 10.3.1
frr defaults traditional
hostname frr-m20-source
log stdout informational

ip prefix-list MIXED seq 10 permit 192.168.2.0/24
!
route-map PREPEND-PUBLIC permit 10
 match ip address prefix-list MIXED
 set as-path prepend 64000
route-map PREPEND-PUBLIC permit 20
!
router bgp 64512
 bgp router-id 10.0.0.2
 no bgp ebgp-requires-policy
 neighbor 10.0.0.1 remote-as 65001
 neighbor 10.0.0.1 description rustbgpd-m20
 neighbor 10.0.0.1 timers 30 90
 !
 address-family ipv4 unicast
  network 192.168.1.0/24
  network 192.168.2.0/24
  neighbor 10.0.0.1 route-map PREPEND-PUBLIC out
 exit-address-family
!
ip route 192.168.1.0/24 10.0.0.2
ip route 192.168.2.0/24 10.0.0.2
!
