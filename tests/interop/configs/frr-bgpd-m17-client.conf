frr version 10.3.1
frr defaults traditional
hostname frr-m17-client
log stdout informational

router bgp 65004
 bgp router-id 10.0.2.2
 no bgp ebgp-requires-policy
 neighbor 10.0.2.1 remote-as 65001
 neighbor 10.0.2.1 description rustbgpd-m17
 neighbor 10.0.2.1 timers 30 90
 !
 address-family ipv4 unicast
  neighbor 10.0.2.1 addpath-rx-all-paths
 exit-address-family
!
