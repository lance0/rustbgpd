frr version 10.3.1
frr defaults traditional
hostname frr-m10-ipv6
log stdout informational

router bgp 65002
 bgp router-id 10.0.0.2
 no bgp ebgp-requires-policy
 neighbor 10.0.0.1 remote-as 65001
 neighbor 10.0.0.1 description rustbgpd-m10
 neighbor 10.0.0.1 timers 30 90
 !
 address-family ipv4 unicast
  network 192.168.1.0/24
  network 10.10.0.0/16
 exit-address-family
 !
 address-family ipv6 unicast
  neighbor 10.0.0.1 activate
  network 2001:db8:1::/48
  network 2001:db8:2::/48
 exit-address-family
!
ip route 192.168.1.0/24 10.0.0.2
ip route 10.10.0.0/16 10.0.0.2
ipv6 route 2001:db8:1::/48 fd00::2
ipv6 route 2001:db8:2::/48 fd00::2
!
