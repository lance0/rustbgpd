# M4 interop config — 8 static peers, 2 added dynamically via gRPC
# Per-peer export policy: frr-01 gets deny on 10.0.0.0/8

[global]
asn = 65001
router_id = "10.0.10.1"
listen_port = 179

[global.telemetry]
prometheus_addr = "0.0.0.0:9179"
log_format = "json"
grpc_addr = "0.0.0.0:50051"

# FRR-01 (AS 65010) — has per-peer export policy
[[neighbors]]
address = "10.0.10.2"
remote_asn = 65010
description = "frr-01"
hold_time = 90

[[neighbors.export_policy]]
prefix = "10.0.0.0/8"
le = 32
action = "deny"

