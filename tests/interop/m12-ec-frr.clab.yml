# Containerlab topology: rustbgpd ↔ FRR (M12 — Extended Communities)
#
# Validates: Extended community (RFC 4360) decode, RIB storage, gRPC exposure,
# and route injection with extended communities.
#
# FRR advertises: 192.168.1.0/24, 192.168.2.0/24 with RT:65002:100
#
# Usage:
#   containerlab deploy -t tests/interop/m12-ec-frr.clab.yml
#   containerlab destroy -t tests/interop/m12-ec-frr.clab.yml

name: m12-ec-frr

topology:
  nodes:
    rustbgpd:
      kind: linux
      image: rustbgpd:dev
      binds:
        - ./configs/rustbgpd-m12-ec.toml:/etc/rustbgpd/config.toml:ro
        - ./scripts/start-rustbgpd.sh:/usr/local/bin/start-rustbgpd.sh:ro
      exec:
        - ip addr add 10.0.0.1/24 dev eth1
        - ip link set eth1 up
      env:
        RUST_LOG: info

    frr:
      kind: linux
      image: quay.io/frrouting/frr:10.3.1
      binds:
        - ./configs/frr-daemons:/etc/frr/daemons:ro
        - ./configs/frr-bgpd-m12-ec.conf:/etc/frr/frr.conf:ro
      exec:
        - ip addr add 10.0.0.2/24 dev eth1
        - ip link set eth1 up

  links:
    - endpoints: ["rustbgpd:eth1", "frr:eth1"]

# Network: 10.0.0.0/24
# rustbgpd: 10.0.0.1, AS 65001
# FRR:      10.0.0.2, AS 65002
