# Containerlab topology: rustbgpd ↔ BIRD (Milestone 0)
#
# Validates: OPEN exchange, KEEPALIVE hold, NOTIFICATION on error,
# session re-establishment after peer restart and TCP reset.
#
# Usage:
#   containerlab deploy -t tests/interop/m0-bird.clab.yml
#   containerlab destroy -t tests/interop/m0-bird.clab.yml

name: m0-bird

topology:
  nodes:
    rustbgpd:
      kind: linux
      image: rustbgpd:dev
      binds:
        - ./configs/rustbgpd-bird.toml:/etc/rustbgpd/config.toml:ro
        - ./scripts/start-rustbgpd.sh:/usr/local/bin/start-rustbgpd.sh:ro
      exec:
        - ip addr add 10.0.1.1/24 dev eth1
        - ip link set eth1 up
      env:
        RUST_LOG: info

    bird:
      kind: linux
      image: bird:2-bookworm
      binds:
        - ./configs/bird-m0.conf:/etc/bird/bird.conf:ro
      exec:
        - ip addr add 10.0.1.2/24 dev eth1
        - ip link set eth1 up

  links:
    - endpoints: ["rustbgpd:eth1", "bird:eth1"]

# Network: 10.0.1.0/24
# rustbgpd: 10.0.1.1, AS 65001
# BIRD:     10.0.1.2, AS 65003
