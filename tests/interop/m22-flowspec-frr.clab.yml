# Containerlab topology: rustbgpd ↔ FRR (M22 — FlowSpec)
#
# Validates: FlowSpec rule injection via gRPC, distribution to FRR,
# withdrawal propagation. FRR 10.3.1 receives FlowSpec but cannot originate.
#
# Flow: rustbgpd (gRPC inject) → eBGP → FRR (receive and display)
#
# Usage:
#   containerlab deploy -t tests/interop/m22-flowspec-frr.clab.yml
#   containerlab destroy -t tests/interop/m22-flowspec-frr.clab.yml

name: m22-flowspec-frr

topology:
  nodes:
    rustbgpd:
      kind: linux
      image: rustbgpd:dev
      cmd: sleep infinity
      binds:
        - ./configs/rustbgpd-m22-flowspec.toml:/etc/rustbgpd/config.toml:ro
        - ./scripts/start-rustbgpd.sh:/usr/local/bin/start-rustbgpd.sh:ro
      exec:
        - ip addr add 10.0.0.1/24 dev eth1
        - ip link set eth1 up
      env:
        RUST_LOG: info

    frr:
      kind: linux
      image: quay.io/frrouting/frr:10.3.1
      binds:
        - ./configs/frr-daemons:/etc/frr/daemons:ro
        - ./configs/frr-bgpd-m22-flowspec.conf:/etc/frr/frr.conf:ro
      exec:
        - ip addr add 10.0.0.2/24 dev eth1
        - ip link set eth1 up

  links:
    - endpoints: ["rustbgpd:eth1", "frr:eth1"]

# Network: 10.0.0.0/24
# rustbgpd: 10.0.0.1, AS 65001
# FRR:      10.0.0.2, AS 65002
