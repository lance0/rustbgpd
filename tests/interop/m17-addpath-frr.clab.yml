# Containerlab topology: rustbgpd ↔ 3× FRR (M17 — Add-Path multi-path send)
#
# Validates: RFC 7911 Add-Path receive and multi-path send.
#
# FRR-A (AS 65002) advertises: 192.168.10.0/24, 192.168.1.0/24
# FRR-B (AS 65003) advertises: 192.168.10.0/24, 192.168.2.0/24
# FRR-Client (AS 65004) receives: multiple paths for 192.168.10.0/24
#
# Usage:
#   containerlab deploy -t tests/interop/m17-addpath-frr.clab.yml
#   containerlab destroy -t tests/interop/m17-addpath-frr.clab.yml

name: m17-addpath-frr

topology:
  nodes:
    rustbgpd:
      kind: linux
      image: rustbgpd:dev
      cmd: sleep infinity
      binds:
        - ./configs/rustbgpd-m17-addpath.toml:/etc/rustbgpd/config.toml:ro
        - ./scripts/start-rustbgpd.sh:/usr/local/bin/start-rustbgpd.sh:ro
      exec:
        - ip addr add 10.0.0.1/24 dev eth1
        - ip link set eth1 up
        - ip addr add 10.0.1.1/24 dev eth2
        - ip link set eth2 up
        - ip addr add 10.0.2.1/24 dev eth3
        - ip link set eth3 up
      env:
        RUST_LOG: info

    frr-a:
      kind: linux
      image: quay.io/frrouting/frr:10.3.1
      binds:
        - ./configs/frr-daemons:/etc/frr/daemons:ro
        - ./configs/frr-bgpd-m17-a.conf:/etc/frr/frr.conf:ro
      exec:
        - ip addr add 10.0.0.2/24 dev eth1
        - ip link set eth1 up

    frr-b:
      kind: linux
      image: quay.io/frrouting/frr:10.3.1
      binds:
        - ./configs/frr-daemons:/etc/frr/daemons:ro
        - ./configs/frr-bgpd-m17-b.conf:/etc/frr/frr.conf:ro
      exec:
        - ip addr add 10.0.1.2/24 dev eth1
        - ip link set eth1 up

    frr-client:
      kind: linux
      image: quay.io/frrouting/frr:10.3.1
      binds:
        - ./configs/frr-daemons:/etc/frr/daemons:ro
        - ./configs/frr-bgpd-m17-client.conf:/etc/frr/frr.conf:ro
      exec:
        - ip addr add 10.0.2.2/24 dev eth1
        - ip link set eth1 up

  links:
    - endpoints: ["rustbgpd:eth1", "frr-a:eth1"]
    - endpoints: ["rustbgpd:eth2", "frr-b:eth1"]
    - endpoints: ["rustbgpd:eth3", "frr-client:eth1"]

# Network A: 10.0.0.0/24 — rustbgpd (10.0.0.1) ↔ FRR-A (10.0.0.2, AS 65002)
# Network B: 10.0.1.0/24 — rustbgpd (10.0.1.1) ↔ FRR-B (10.0.1.2, AS 65003)
# Network C: 10.0.2.0/24 — rustbgpd (10.0.2.1) ↔ FRR-Client (10.0.2.2, AS 65004)
