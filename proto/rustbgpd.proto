  repeated string policy_names = 1;
}

message SetGlobalImportChainResponse {}

message SetGlobalExportChainRequest {
  repeated string policy_names = 1;
}

message SetGlobalExportChainResponse {}

message ClearGlobalImportChainRequest {}

message ClearGlobalImportChainResponse {}

message ClearGlobalExportChainRequest {}

message ClearGlobalExportChainResponse {}

message NeighborPolicyChains {
