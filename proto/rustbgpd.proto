syntax = "proto3";

package rustbgpd.v1;

option java_multiple_files = true;
option java_package = "com.rustbgpd.v1";

// ---------------------------------------------------------------------------
// Common types
// ---------------------------------------------------------------------------

enum AddressFamily {
  ADDRESS_FAMILY_UNSPECIFIED = 0;
  ADDRESS_FAMILY_IPV4_UNICAST = 1;
  ADDRESS_FAMILY_IPV6_UNICAST = 2;
  ADDRESS_FAMILY_IPV4_FLOWSPEC = 3;
  ADDRESS_FAMILY_IPV6_FLOWSPEC = 4;
}

enum SessionState {
  SESSION_STATE_UNSPECIFIED = 0;
  SESSION_STATE_IDLE = 1;
  SESSION_STATE_CONNECT = 2;
  SESSION_STATE_ACTIVE = 3;
  SESSION_STATE_OPEN_SENT = 4;
  SESSION_STATE_OPEN_CONFIRM = 5;
  SESSION_STATE_ESTABLISHED = 6;
}

message ErrorDetail {
  oneof kind {
    BgpProtocolError bgp = 1;
    ResourceLimitError resource = 2;
    ConfigError config = 3;
  }
}

message BgpProtocolError {
  uint32 error_code = 1;
  uint32 error_subcode = 2;
  string description = 3;
  string peer_address = 4;
}

message ResourceLimitError {
  string limit_name = 1;
  uint64 current_value = 2;
  uint64 max_value = 3;
  string peer_address = 4;
}

message ConfigError {
  string field_path = 1;
  string message = 2;
  string provided_value = 3;
}

// ---------------------------------------------------------------------------
// GlobalService — Daemon configuration and identity
// ---------------------------------------------------------------------------

service GlobalService {
  rpc GetGlobal(GetGlobalRequest) returns (GlobalState);
  // Reserved for future use. Always returns UNIMPLEMENTED.
  rpc SetGlobal(SetGlobalRequest) returns (SetGlobalResponse);
}

message GetGlobalRequest {}

message GlobalState {
  uint32 asn = 1;
  string router_id = 2;
  uint32 listen_port = 3;
}

// Reserved for future use. Always returns UNIMPLEMENTED.
message SetGlobalRequest {
  uint32 asn = 1;
  string router_id = 2;
  uint32 listen_port = 3;
}

// Reserved for future use. Always returns UNIMPLEMENTED.
message SetGlobalResponse {}

// ---------------------------------------------------------------------------
// NeighborService — Peer lifecycle and state
// ---------------------------------------------------------------------------

service NeighborService {
  rpc AddNeighbor(AddNeighborRequest) returns (AddNeighborResponse);
  rpc DeleteNeighbor(DeleteNeighborRequest) returns (DeleteNeighborResponse);
  rpc ListNeighbors(ListNeighborsRequest) returns (ListNeighborsResponse);
  rpc GetNeighborState(GetNeighborStateRequest) returns (NeighborState);
  rpc EnableNeighbor(EnableNeighborRequest) returns (EnableNeighborResponse);
  rpc DisableNeighbor(DisableNeighborRequest) returns (DisableNeighborResponse);
  rpc SoftResetIn(SoftResetInRequest) returns (SoftResetInResponse);
  rpc ListDynamicNeighbors(ListDynamicNeighborsRequest) returns (ListDynamicNeighborsResponse);
  rpc AddDynamicNeighbor(AddDynamicNeighborRequest) returns (AddDynamicNeighborResponse);
  rpc DeleteDynamicNeighbor(DeleteDynamicNeighborRequest) returns (DeleteDynamicNeighborResponse);
}

message NeighborConfig {
  string address = 1;
  uint32 remote_asn = 2;
  string description = 3;
  uint32 hold_time = 4;
  uint32 max_prefixes = 5;
  // Address families (e.g., "ipv4_unicast", "ipv6_unicast").
  // If empty, defaults to ["ipv4_unicast"].
  repeated string families = 6;
  // Private AS removal mode: "", "remove", "all", or "replace".
  // Empty string means disabled (default).
  string remove_private_as = 7;
  // Optional peer-group reference for inherited transport/policy defaults.
  string peer_group = 8;
  // Whether this eBGP peer is a transparent route-server client.
  bool route_server_client = 9;
  // Enable Add-Path receive capability for this peer.
  bool add_path_receive = 10;
  // Enable Add-Path send capability for this peer.
  bool add_path_send = 11;
  // Maximum paths to advertise per prefix (Add-Path send).
  uint32 add_path_send_max = 12;
}

message NeighborState {
  NeighborConfig config = 1;
  SessionState state = 2;
  uint64 uptime_seconds = 3;
  uint64 prefixes_received = 4;
  uint64 prefixes_sent = 5;
  uint64 updates_received = 6;
  uint64 updates_sent = 7;
  uint64 notifications_received = 8;
  uint64 notifications_sent = 9;
  uint64 flap_count = 10;
  string last_error = 11;
  // True for peers auto-created from a dynamic_neighbors prefix range.
  bool is_dynamic = 12;
}

message DynamicNeighborRange {
  // IP prefix range (e.g., "10.0.0.0/24").
  string prefix = 1;
  // Peer group whose config dynamic peers inherit.
  string peer_group = 2;
  // Expected remote ASN. 0 = accept any ASN from OPEN.
  uint32 remote_asn = 3;
  // Description applied to dynamic peers from this range.
  string description = 4;
}

message ListDynamicNeighborsRequest {}

message ListDynamicNeighborsResponse {
  repeated DynamicNeighborRange ranges = 1;
}

message AddDynamicNeighborRequest {
  DynamicNeighborRange range = 1;
}

message AddDynamicNeighborResponse {}

message DeleteDynamicNeighborRequest {
  string prefix = 1;
}

message DeleteDynamicNeighborResponse {}

message AddNeighborRequest {
  NeighborConfig config = 1;
}

message AddNeighborResponse {}

message DeleteNeighborRequest {
  string address = 1;
}

message DeleteNeighborResponse {}

message ListNeighborsRequest {}

message ListNeighborsResponse {
  repeated NeighborState neighbors = 1;
}

message GetNeighborStateRequest {
  string address = 1;
}

message EnableNeighborRequest {
  string address = 1;
}

message EnableNeighborResponse {}

message DisableNeighborRequest {
  string address = 1;
  string reason = 2;
}

message DisableNeighborResponse {}

message SoftResetInRequest {
  string address = 1;
  // Address families to refresh (e.g., "ipv4_unicast", "ipv6_unicast").
  // If empty, refreshes all configured families for the peer.
  repeated string families = 2;
}

message SoftResetInResponse {}

// ---------------------------------------------------------------------------
// PolicyService — Named policy definitions and chain assignment
// ---------------------------------------------------------------------------

service PolicyService {
  rpc ListPolicies(ListPoliciesRequest) returns (ListPoliciesResponse);
  rpc GetPolicy(GetPolicyRequest) returns (GetPolicyResponse);
  rpc SetPolicy(SetPolicyRequest) returns (SetPolicyResponse);
  rpc DeletePolicy(DeletePolicyRequest) returns (DeletePolicyResponse);
  rpc ListNeighborSets(ListNeighborSetsRequest) returns (ListNeighborSetsResponse);
  rpc GetNeighborSet(GetNeighborSetRequest) returns (GetNeighborSetResponse);
  rpc SetNeighborSet(SetNeighborSetRequest) returns (SetNeighborSetResponse);
  rpc DeleteNeighborSet(DeleteNeighborSetRequest) returns (DeleteNeighborSetResponse);
  rpc GetGlobalPolicyChains(GetGlobalPolicyChainsRequest) returns (GlobalPolicyChains);
  rpc SetGlobalImportChain(SetGlobalImportChainRequest) returns (SetGlobalImportChainResponse);
  rpc SetGlobalExportChain(SetGlobalExportChainRequest) returns (SetGlobalExportChainResponse);
  rpc ClearGlobalImportChain(ClearGlobalImportChainRequest) returns (ClearGlobalImportChainResponse);
  rpc ClearGlobalExportChain(ClearGlobalExportChainRequest) returns (ClearGlobalExportChainResponse);
  rpc GetNeighborPolicyChains(GetNeighborPolicyChainsRequest) returns (NeighborPolicyChains);
  rpc SetNeighborImportChain(SetNeighborImportChainRequest) returns (SetNeighborImportChainResponse);
  rpc SetNeighborExportChain(SetNeighborExportChainRequest) returns (SetNeighborExportChainResponse);
  rpc ClearNeighborImportChain(ClearNeighborImportChainRequest) returns (ClearNeighborImportChainResponse);
  rpc ClearNeighborExportChain(ClearNeighborExportChainRequest) returns (ClearNeighborExportChainResponse);
}

service PeerGroupService {
  rpc ListPeerGroups(ListPeerGroupsRequest) returns (ListPeerGroupsResponse);
  rpc GetPeerGroup(GetPeerGroupRequest) returns (GetPeerGroupResponse);
  rpc SetPeerGroup(SetPeerGroupRequest) returns (SetPeerGroupResponse);
  rpc DeletePeerGroup(DeletePeerGroupRequest) returns (DeletePeerGroupResponse);
  rpc SetNeighborPeerGroup(SetNeighborPeerGroupRequest) returns (SetNeighborPeerGroupResponse);
  rpc ClearNeighborPeerGroup(ClearNeighborPeerGroupRequest) returns (ClearNeighborPeerGroupResponse);
}

message PolicyDefinition {
  string default_action = 1;
  repeated PolicyStatement statements = 2;
}

message NamedPolicy {
  string name = 1;
  PolicyDefinition definition = 2;
}

message NeighborSetDefinition {
  repeated string addresses = 1;
  repeated uint32 remote_asns = 2;
  repeated string peer_groups = 3;
}

message NamedNeighborSet {
  string name = 1;
  NeighborSetDefinition definition = 2;
}

message PeerGroupDefinition {
  optional uint32 hold_time = 1;
  optional uint32 max_prefixes = 2;
  optional string md5_password = 3;
  optional bool ttl_security = 4;
  repeated string families = 5;
  optional bool graceful_restart = 6;
  optional uint32 gr_restart_time = 7;
  optional uint64 gr_stale_routes_time = 8;
  optional uint32 llgr_stale_time = 9;
  optional string local_ipv6_nexthop = 10;
  optional bool route_reflector_client = 11;
  optional bool route_server_client = 12;
  optional string remove_private_as = 13;
  optional bool add_path_receive = 14;
  optional bool add_path_send = 15;
  optional uint32 add_path_send_max = 16;
  repeated PolicyStatement import_policy = 17;
  repeated PolicyStatement export_policy = 18;
  repeated string import_policy_chain = 19;
  repeated string export_policy_chain = 20;
}

message NamedPeerGroup {
  string name = 1;
  PeerGroupDefinition definition = 2;
}

message PolicyStatement {
  string action = 1;
  optional string prefix = 2;
  optional uint32 ge = 3;
  optional uint32 le = 4;
  repeated string match_community = 5;
  optional string match_as_path = 6;
  optional uint32 match_as_path_length_ge = 7;
  optional uint32 match_as_path_length_le = 8;
  optional string match_rpki_validation = 9;
  optional uint32 set_local_pref = 10;
  optional uint32 set_med = 11;
  optional string set_next_hop = 12;
  repeated string set_community_add = 13;
  repeated string set_community_remove = 14;
  AsPathPrepend set_as_path_prepend = 15;
  optional string match_neighbor_set = 16;
  optional string match_route_type = 17;
  optional uint32 match_local_pref_ge = 18;
  optional uint32 match_local_pref_le = 19;
  optional uint32 match_med_ge = 20;
  optional uint32 match_med_le = 21;
  optional string match_next_hop = 22;
  optional string match_aspa_validation = 23;
}

message AsPathPrepend {
  uint32 asn = 1;
  uint32 count = 2;
}

message ListPoliciesRequest {}

message ListPoliciesResponse {
  repeated NamedPolicy policies = 1;
}

message GetPolicyRequest {
  string name = 1;
}

message GetPolicyResponse {
  string name = 1;
  PolicyDefinition definition = 2;
}

message SetPolicyRequest {
  string name = 1;
  PolicyDefinition definition = 2;
}

message SetPolicyResponse {}

message DeletePolicyRequest {
  string name = 1;
}

message DeletePolicyResponse {}

message ListNeighborSetsRequest {}

message ListNeighborSetsResponse {
  repeated NamedNeighborSet neighbor_sets = 1;
}

message GetNeighborSetRequest {
  string name = 1;
}

message GetNeighborSetResponse {
  string name = 1;
  NeighborSetDefinition definition = 2;
}

message SetNeighborSetRequest {
  string name = 1;
  NeighborSetDefinition definition = 2;
}

message SetNeighborSetResponse {}

message DeleteNeighborSetRequest {
  string name = 1;
}

message DeleteNeighborSetResponse {}

message ListPeerGroupsRequest {}

message ListPeerGroupsResponse {
  repeated NamedPeerGroup peer_groups = 1;
}

message GetPeerGroupRequest {
  string name = 1;
}

message GetPeerGroupResponse {
  string name = 1;
  PeerGroupDefinition definition = 2;
}

message SetPeerGroupRequest {
  string name = 1;
  PeerGroupDefinition definition = 2;
}

message SetPeerGroupResponse {}

message DeletePeerGroupRequest {
  string name = 1;
}

message DeletePeerGroupResponse {}

message SetNeighborPeerGroupRequest {
  string address = 1;
  string peer_group = 2;
}

message SetNeighborPeerGroupResponse {}

message ClearNeighborPeerGroupRequest {
  string address = 1;
}

message ClearNeighborPeerGroupResponse {}

message GlobalPolicyChains {
